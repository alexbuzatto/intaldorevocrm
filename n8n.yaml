## --------------------------- ORION --------------------------- ##

  n8n_redis
    image redislatest  ## Versão do Redis
    command [
        redis-server,
        --appendonly,
        yes,
        --port,
        6379
      ]

    volumes
      - n8n_redisdata

    networks
      - eclick ## Nome da rede interna

    ## Descomente as linhas abaixo para uso externo
    #ports
    #  - 63796379

    deploy
      placement
        constraints
          - node.role == manager
      resources
        limits
          cpus 1
          memory 1024M

## --------------------------- ORION --------------------------- ##

volumes
  n8n_redis
    external true
    name n8n_redis

