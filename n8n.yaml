version 3.7
services

## --------------------------- ORION --------------------------- ##

  n8n_editor
    image n8nion8nlatest ## Versão do N8N
    command start

    networks
      - eclick ## Nome da rede interna

    environment
    ## 🗄️ Banco de Dados (PostgreSQL)
      - N8N_FIX_MIGRATIONS=true 
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=n8n_queue
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=595a758f60ac32432859a158cf2c03eb

    ## 🔐 Criptografia
      - N8N_ENCRYPTION_KEY=b9e23c4b38b8326fd50dac2cb3129167

      ## 🌐 URLs e Configurações de Acesso
      - N8N_HOST=en8n.eclicksolucoes.com.br
      - N8N_EDITOR_BASE_URL=httpsen8n.eclicksolucoes.com.br
      - WEBHOOK_URL=httpswebhookn8n.eclicksolucoes.com.br
      - N8N_PROTOCOL=https
      - N8N_PROXY_HOPS=1
      - N8N_ONBOARDING_FLOW_DISABLED=true
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_SKIP_AUTH_ON_OAUTH_CALLBACK=false

    ## ⚙️ Ambiente de Execução
      - NODE_ENV=production
      - EXECUTIONS_MODE=queue
      - EXECUTIONS_TIMEOUT=3600
      - EXECUTIONS_TIMEOUT_MAX=7200
      - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=internal
      - N8N_RESTRICT_FILE_ACCESS_TO=~.n8n-files
      - NODES_EXCLUDE=[]

    ## 📦 Pacotes e Nós Comunitários
      - N8N_REINSTALL_MISSING_PACKAGES=true
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      - N8N_NODE_PATH=homenode.n8nnodes
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true

    ## 📧 SMTP (Envio de E-mails)
      - N8N_SMTP_SENDER=tecnologia@sooretama.es.gov.br
      - N8N_SMTP_USER=tecnologia@sooretama.es.gov.br
      - N8N_SMTP_PASS=ooqd cklm qfdf ecwk
      - N8N_SMTP_HOST=smtp.gmail.com
      - N8N_SMTP_PORT=465
      - N8N_SMTP_SSL=true

    ## 🔁 Redis (Fila de Execução)
      - QUEUE_BULL_REDIS_HOST=n8n_redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_DB=1

    ## 📊 Métricas
      - N8N_METRICS=true

    ## ⏱️ Execuções e Limpeza
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=336

    ## 🧠 Recursos de IA
      - N8N_AI_ENABLED=false
      - N8N_AI_PROVIDER=openai
      - N8N_AI_OPENAI_API_KEY=

    ## 🧰 Permissões em Funções Personalizadas
      - NODE_FUNCTION_ALLOW_BUILTIN=
      - NODE_FUNCTION_ALLOW_EXTERNAL=moment,lodash

    ## 🕒 Fuso Horário
      - GENERIC_TIMEZONE=AmericaSao_Paulo
      - TZ=AmericaSao_Paulo
      #- N8N_DEFAULT_LOCALE=pt-BR

    deploy
      mode replicated
      replicas 1
      placement
        constraints
          - node.role == manager
      resources
        limits
          cpus 1
          memory 1024M
      labels
        - traefik.enable=true
        - traefik.http.routers.n8n_editor.rule=Host(`en8n.eclicksolucoes.com.br`) ## Url do Editor do N8N
        - traefik.http.routers.n8n_editor.entrypoints=websecure
        - traefik.http.routers.n8n_editor.priority=10
        - traefik.http.routers.n8n_editor.tls.certresolver=letsencryptresolver
        - traefik.http.routers.n8n_editor.service=n8n_editor
        - traefik.http.services.n8n_editor.loadbalancer.server.port=5678
        - traefik.http.services.n8n_editor.loadbalancer.passHostHeader=1

